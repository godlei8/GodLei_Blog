name: Deploy Admin Panel

on:
  push:
    branches: [ master ]
    paths:
      - '*Blog-AdminPanel/**'
      - '.github/workflows/deploy-adminpanel.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect admin directory
        run: echo "ADMIN_DIR=$(find . -maxdepth 1 -type d -name '*Blog-AdminPanel' | sort -r | head -n 1 | sed 's#^./##')" >> $GITHUB_ENV

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: ${{ env.ADMIN_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ env.ADMIN_DIR }}
        run: npm ci

      - name: Build project
        working-directory: ./${{ env.ADMIN_DIR }}
        run: npm run build

      - name: Deploy to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --delete
          path: ${{ env.ADMIN_DIR }}/dist/
          remote_path: /var/lib/docker/volumes/html/_data/admin/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
