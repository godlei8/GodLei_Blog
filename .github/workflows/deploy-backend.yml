name: Deploy Backend

on:
  push:
    branches: [ master ]
    paths:
      - 'AyeezBlog-Backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        working-directory: ./AyeezBlog-Backend
        run: |
          mvn clean package -DskipTests

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DB_PASSWORD: ${{ secrets.HM_DB_PASSWORD }}
        run: |
          set -euo pipefail

          SSH_OPTS="-o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          SCP_OPTS="-o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=10 -o Compression=no"

          JAR_PATH="AyeezBlog-Backend/blog-server/target/blog-server-0.0.1-SNAPSHOT.jar"
          REMOTE_DIR="/var/lib/docker/volumes/jar/_data"
          REMOTE_JAR="${REMOTE_DIR}/app.jar"
          REMOTE_WRITE_TEST_FILE="${REMOTE_DIR}/.write_test"

          if ! command -v ssh >/dev/null 2>&1 || ! command -v scp >/dev/null 2>&1; then
            echo "⚠️ 未检测到 ssh/scp，开始安装 openssh-client..."
            sudo apt-get update
            sudo apt-get install -y openssh-client
          else
            echo "✅ ssh/scp 已存在，跳过安装"
          fi
          
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          echo "📦 开始部署后端服务..."
          
          # 调试1：检查本地 DB_PASSWORD 变量
          echo "🔍 调试1：本地 DB_PASSWORD 长度 = ${#DB_PASSWORD}"
          if [ -z "$DB_PASSWORD" ]; then
            echo "❌ 错误：本地 DB_PASSWORD 为空！请检查 GitHub Secrets"
            exit 1
          else
            echo "✅ 本地 DB_PASSWORD 非空，长度: ${#DB_PASSWORD}"
          fi

          echo "🔍 本地 jar 信息："
          ls -lh "$JAR_PATH"
          echo -n "本地 jar sha256: "
          sha256sum "$JAR_PATH" | awk '{print $1}'

          echo "🔍 远端目录/磁盘状态（部署前）："
          ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "set -e; df -h /var/lib/docker; ls -lah '$REMOTE_DIR' || true; ls -lah '$REMOTE_JAR' || true"

          echo "🧪 远端写入测试（写 20MB，小文件 IO 是否卡住）..."
          timeout 120s ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "set -e; rm -f '$REMOTE_WRITE_TEST_FILE' || true; (time dd if=/dev/zero of='$REMOTE_WRITE_TEST_FILE' bs=1M count=20 conv=fdatasync status=progress) ; rm -f '$REMOTE_WRITE_TEST_FILE' || true"

          echo "🗑️  删除旧的 jar包..."
          {
            start_ts=$(date +%s)
            ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "rm -f '$REMOTE_DIR'/*.jar"
            end_ts=$(date +%s)
            echo "🗑️ 删除旧 jar 耗时：$((end_ts-start_ts))s"
          }
          
          echo "⬆️  上传新的jar包..."
          {
            start_ts=$(date +%s)
            echo "::group::scp 上传诊断"
            echo "scp src=$JAR_PATH"
            echo "scp dst=${SSH_USER}@${SSH_HOST}:${REMOTE_JAR}"

            echo "🔄 监控远端 app.jar 大小（scp 期间每 5 秒输出一次）..."
            # scp 过程中轮询远端 app.jar 大小，快速判断卡在“传输中断”还是“写入/收尾阶段”。
            # 注意：轮询由远端执行，避免依赖 scp 自带进度输出。
            set +e
            POLL_PID=$(ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "set -e; (while true; do if [ -f '$REMOTE_JAR' ]; then sz=\$(stat -c%s '$REMOTE_JAR' 2>/dev/null || echo 0); ts=\$(date +%H:%M:%S); echo \"POLL \$ts size=\${sz}B\"; fi; sleep 5; done) & echo \$!" 2>/dev/null)
            set -e

            if [ -z "$POLL_PID" ]; then
              echo "⚠️ 未能获取远端轮询进程 PID（忽略轮询）。"
            else
              echo "🕵️ 远端轮询 PID=$POLL_PID"
            fi
            cleanup_poller() {
              if [ -n "${POLL_PID:-}" ]; then
                ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "kill '$POLL_PID' 2>/dev/null || true" >/dev/null 2>&1 || true
              fi
            }
            trap cleanup_poller EXIT

            set +e
            timeout 900s scp -vv $SCP_OPTS "$JAR_PATH" "${SSH_USER}@${SSH_HOST}:${REMOTE_JAR}"
            SCP_RC=$?
            set -e

            trap - EXIT
            cleanup_poller || true

            echo "⬆️ scp 上传返回码：$SCP_RC"
            end_ts=$(date +%s)
            echo "::endgroup::"
            echo "⬆️ scp 上传耗时：$((end_ts-start_ts))s"

            if [ "$SCP_RC" -ne 0 ]; then
              echo "❌ scp 未成功完成：请重点检查远端写入是否卡住/网络是否不稳定。"
              ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "set -e; ls -lah '$REMOTE_DIR' || true; (sha256sum '$REMOTE_JAR' || true) "
              exit "$SCP_RC"
            fi
          }

          echo "🔍 远端目录/磁盘状态（部署后）："
          ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "set -e; df -h /var/lib/docker; ls -lah '$REMOTE_DIR'; ls -lah '$REMOTE_JAR'"

          ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "set -e; echo '远端 app.jar sha256:'; sha256sum '$REMOTE_JAR' | awk '{print \$1}'"
          
          echo "🔄 重启 Docker 容器并注入环境变量..."
          # 关键修复：去掉 'EOF' 的单引号，让本地变量展开
          {
            start_ts=$(date +%s)
            ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} << EOF
            echo "🔍 调试2：远程脚本开始执行"
            echo "🔍 调试2：接收到的密码长度：${#DB_PASSWORD}"
            echo "🔍 调试2：密码前4位（仅验证）：${DB_PASSWORD:0:4}****"
          
            docker stop ayeezblog-backend || true
            docker rm ayeezblog-backend || true
          
            # 使用双引号包裹密码，防止特殊字符导致问题
            docker run -d \\
              --name ayeezblog-backend \\
              --network ayeez \\
              -e HM_DB_HOST=mysql \\
              -e "HM_DB_PASSWORD=${DB_PASSWORD}" \\
              -e SPRING_PROFILES_ACTIVE=dev \\
              -p 8080:8080 \\
              -v /var/lib/docker/volumes/jar/_data/app.jar:/app/app.jar \\
              ayeezblog:latest
          
            # 等待容器启动
            sleep 3
          
            echo "🔍 调试3：容器内环境变量检查："
            docker exec ayeezblog-backend env | grep HM_DB_PASSWORD || echo "❌ 容器内未找到 HM_DB_PASSWORD"
          
            echo "✅ 后端部署完成！"
          EOF
            end_ts=$(date +%s)
            echo "🔄 容器重启/环境注入耗时：$((end_ts-start_ts))s"
          }
          
          # 调试4：从宿主机再次验证
          echo "🔍 调试4：从宿主机二次验证容器环境变量："
          ssh $SSH_OPTS ${SSH_USER}@${SSH_HOST} "docker exec ayeezblog-backend env | grep HM_DB_PASSWORD || echo '❌ 未找到'"
          
          echo "🌐 服务地址：http://${SSH_HOST}:8080"