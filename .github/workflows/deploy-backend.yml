name: Deploy Backend

on:
  push:
    branches: [ master ]
    paths:
      - '*Blog-Backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect backend directory
        run: echo "BACKEND_DIR=$(find . -maxdepth 1 -type d -name '*Blog-Backend' | sort -r | head -n 1 | sed 's#^./##')" >> $GITHUB_ENV

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Build with Maven
        working-directory: ./${{ env.BACKEND_DIR }}
        run: mvn clean package -DskipTests

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          DB_PASSWORD: ${{ secrets.HM_DB_PASSWORD }}
          BACKEND_DIR: ${{ env.BACKEND_DIR }}
        run: |
          if ! command -v ssh >/dev/null 2>&1 || ! command -v scp >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y openssh-client
          fi

          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh "${SSH_USER}@${SSH_HOST}" "rm -f /var/lib/docker/volumes/jar/_data/*.jar"

          scp "${BACKEND_DIR}/blog-server/target/blog-server-0.0.1-SNAPSHOT.jar" \
            "${SSH_USER}@${SSH_HOST}:/var/lib/docker/volumes/jar/_data/app.jar"

          ssh "${SSH_USER}@${SSH_HOST}" << EOF
            docker stop godleiblog-backend || true
            docker rm godleiblog-backend || true

            docker run -d \
              --name godleiblog-backend \
              --network godlei \
              -e HM_DB_HOST=mysql \
              -e "HM_DB_PASSWORD=${DB_PASSWORD}" \
              -e SPRING_PROFILES_ACTIVE=dev \
              -p 8080:8080 \
              -v /var/lib/docker/volumes/jar/_data/app.jar:/app/app.jar \
              godleiblog:latest
          EOF
