#TODO部署后要改配置
#配置数据库的连接信息
spring:
  application:
    name: blog-server
  #数据库的链接信息
  datasource:
    url: jdbc:mysql://${hm.db.host}:3306/godleiblog
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: ${hm.db.password}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

#mybatis的相关配置
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    #开启驼峰命名映射
    map-underscore-to-camel-case: true
  # 添加Mapper位置配置
  mapper-locations: classpath*:cn/godlei/blogserver/mapper/*.xml
  type-aliases-package: cn.godlei.blogpojo.entity

# PageHelper分页配置
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: pageNum=pageNum;pageSize=pageSize;

# 服务器端口配置
server:
  port: 8080

aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucketName: javaweb-godlei
    region: cn-beijing

blog:
  assistant:
    enabled: ${BLOG_ASSISTANT_ENABLED:true}
    base-url: ${BLOG_ASSISTANT_BASE_URL:https://api.minimaxi.com/v1}
    api-key: ${BLOG_ASSISTANT_API_KEY:${MINIMAX_API_KEY:${OPENAI_API_KEY:}}}
    model: MiniMax-M2.7
    connect-timeout-ms: ${BLOG_ASSISTANT_CONNECT_TIMEOUT_MS:10000}
    read-timeout-ms: ${BLOG_ASSISTANT_READ_TIMEOUT_MS:120000}
    max-requests-per-minute: ${BLOG_ASSISTANT_MAX_REQUESTS_PER_MINUTE:12}
    max-input-chars: ${BLOG_ASSISTANT_MAX_INPUT_CHARS:16000}
  storage:
    mode: ${BLOG_STORAGE_MODE:local}
    public-base-url: ${BLOG_STORAGE_PUBLIC_BASE_URL:}
    local:
      base-dir: ${BLOG_STORAGE_LOCAL_BASE_DIR:${user.dir}/uploads}
      public-path: ${BLOG_STORAGE_PUBLIC_PATH:/uploads}
