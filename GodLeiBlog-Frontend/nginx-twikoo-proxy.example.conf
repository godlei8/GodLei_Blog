# 放进 blog.godlei.cn 的 server { } 里（与静态站点、API 反代并列）
#
# 原因：页面在 https://blog.godlei.cn ，Twikoo 在 https://twikoo.godlei.cn ，
# 跨域 + JSON POST 会触发预检，云函数未返回 CORS 时浏览器会拦截。
# 解决：前端 envId 使用同源 https://blog.godlei.cn/twikoo-proxy/ ，由 Nginx 反代到云函数。

# 无尾斜杠时也可命中（任选其一即可）
location = /twikoo-proxy {
    proxy_pass https://twikoo.godlei.cn/;
    proxy_http_version 1.1;
    proxy_set_header Host twikoo.godlei.cn;
    proxy_ssl_server_name on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /twikoo-proxy/ {
    proxy_pass https://twikoo.godlei.cn/;
    proxy_http_version 1.1;
    proxy_set_header Host twikoo.godlei.cn;
    proxy_ssl_server_name on;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
