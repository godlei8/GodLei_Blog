server {
    listen 80;
    server_name 8.137.187.70 godlei8.top www.godlei8.top;

    # 强制HTTP跳转到HTTPS（当配置SSL后启用）
    # return 301 https://$host$request_uri;

    # 前台页面
    location / {
        root /opt/godleiblog/frontend;
        try_files $uri $uri/ /index.html;
    }

    # 后台管理页面
    location /admin {
        alias /opt/godleiblog/admin;
        try_files $uri $uri/ /admin/index.html;
    }

    # API 接口统一前缀 /api
    location /api/ {
        proxy_pass http://localhost:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 特殊处理：AI助手流式接口
    location = /api/assistant/chat/stream {
        proxy_pass http://localhost:8080/assistant/chat/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        gzip off;
    }

    # 兼容历史资源地址，避免线上仍引用 /uploads 时直接 404
    location /uploads/ {
        proxy_pass http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Twikoo 评论服务
    location /twikoo/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
        proxy_buffering off;
        client_max_body_size 10M;
    }

    location /twikoo-proxy/ {
        proxy_pass http://localhost:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
        proxy_buffering off;
        client_max_body_size 10M;
    }

    location = /twikoo {
        return 301 /twikoo/;
    }

    location = /twikoo-proxy {
        return 301 /twikoo-proxy/;
    }
}

